<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>暖阳陪伴 管理后台</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="brand">暖阳陪伴 · 管理后台</div>
        <div class="token">
          <input id="tokenInput" placeholder="粘贴管理员 Token（Bearer 省略）" />
          <button id="saveToken">保存</button>
          <button id="clearToken" class="ghost">清除</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="card-title">概览</div>
          <div class="card-actions">
            <button id="loadOverview">刷新</button>
          </div>
          <pre id="overview" class="pre"></pre>
        </div>

        <div class="card">
          <div class="card-title">设置中心（密钥加密存储）</div>
          <div class="hint">需要后端配置 SETTINGS_ENCRYPTION_KEY（base64 32 bytes）才能保存密钥。</div>
          <div class="settings-form">
            <input id="setKey" placeholder="key（如 AI_API_KEY / BAIDU_OCR_API_KEY）" />
            <input id="setValue" placeholder="value（将加密保存）" />
            <button id="saveSetting">保存</button>
          </div>
          <div class="card-actions">
            <button id="loadSettings" class="ghost">加载已保存 keys</button>
          </div>
          <pre id="settings" class="pre"></pre>
        </div>

        <div class="card">
          <div class="card-title">数据查看</div>
          <div class="card-actions">
            <button data-endpoint="users">用户</button>
            <button data-endpoint="relations" class="ghost">关系</button>
            <button data-endpoint="bind_requests" class="ghost">绑定申请</button>
            <button data-endpoint="emergency_calls" class="ghost">紧急呼救</button>
            <button data-endpoint="medication_ocr_records" class="ghost">用药识别</button>
            <button data-endpoint="logs" class="ghost">活动日志</button>
          </div>
          <pre id="dataView" class="pre"></pre>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
